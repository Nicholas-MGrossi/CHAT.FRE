apiVersion: v1
kind: Secret
metadata:
  name: chatfree-secrets
  namespace: chatfree
type: Opaque
stringData:
  MONGODB_URI: "mongodb://admin:YOUR_PASSWORD@mongodb:27017/chatfree?authSource=admin"
  JWT_SECRET: "YOUR_JWT_SECRET_KEY_HERE"
  MONGO_PASSWORD: "YOUR_MONGO_PASSWORD"
  SMTP_PASSWORD: "YOUR_SMTP_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: chatfree
type: Opaque
stringData:
  username: "admin"
  password: "YOUR_MONGO_PASSWORD"
